<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>

<body>
	<button type="button" onclick="ESFunction('foreach')">foreach</button>
	<button type="button" onclick="ESFunction('map')">Map</button>
	<button type="button" onclick="ESFunction('filter')">filter</button>
	<button type="button" onclick="ESFunction('find')">find</button>
	<button type="button" onclick="ESFunction('findindex')">findindex</button>
	<button type="button" onclick="ESFunction('reduce')">reduce</button>

	<p id="result"></p>

	<script>
		let arr = [2,3,4,5,6,8]
		console.log(arr)
		let ESFunction = (arg) =>{
			let result = document.getElementById("result")
			if(arg == 'foreach'){
				arr.forEach((val,index)=>{
					result.innerHTML = val
				})
			}
		}

	</script>
</body>

</html>
