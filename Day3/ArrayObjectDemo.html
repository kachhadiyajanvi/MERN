<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>

<body>
	<button type="button" onclick="ESFunction('foreach')">foreach</button>
	<button type="button" onclick="ESFunction('map')">Map</button>
	<button type="button" onclick="ESFunction('filter')">filter</button>
	<button type="button" onclick="ESFunction('find')">find</button>
	<button type="button" onclick="ESFunction('findindex')">findindex</button>
	<button type="button" onclick="ESFunction('reduce')">reduce</button>

	<p id="result"></p>

	<script>
		let arr = [2,3,4,5,6,8]
		console.log(arr)
		let ESFunction = (arg) =>{
			let result = document.getElementById("result")
			if(arg == 'foreach'){
				arr.forEach((val,index)=>{
					result.innerHTML += val
				})
			}else if(arg == 'map'){
				let arr1 = arr.map((val,i)=>Math.sqrt(val))
				result.innerHTML = `${arr} <br> ${arr1}`
			}else if(arg == 'filter'){
				let arr1 = arr.filter((val,i)=>val != 5 )
				result.innerHTML = arr1
			}else if(arg == 'find'){
				let arr1 = arr.find((val,i)=>val == 3 )
				result.innerHTML = arr1
			}else if(arg == 'findindex'){
				let arr1 = arr.findIndex((val,i)=>val == 5 )
				result.innerHTML = arr1
			}else if(arg == 'reduce'){
				let total = arr.reduce((prev,curr)=>{return prev+curr})
				result.innerHTML = `${arr} and total is ${total}`
			}
		}

	</script>
</body>

</html>
