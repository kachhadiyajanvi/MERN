<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Even or Odd</h2>
    <div id="result"></div>

    <script>
        let result = document.getElementById('result')
        for(let i = 1;i<=15;i++){
            if(i%2 == 0){
                result.innerHTML += `<p>${i} is Even.</p>`
            }else {
                result.innerHTML += `<p>${i} is Odd.</p>`
            }
        }
    </script>
</body>
</html>
