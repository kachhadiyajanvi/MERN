<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area</title>
</head>

<body>
    <h2>Calculate area and circumference</h2>
    <label for="number">Enter Radius:</label>
    <input type="number" id="number" required>
    <br><br>
    <button id="calculate" onclick="calculate()">Calculate area and circumference</button>
    <br><br>
    <label id="result"></label>

    <script>
        let calculate = () => {
            let radius = document.getElementById('number').value;
            const PI = 3.14
            document.getElementById('result').innerHTML = `area= ${PI * radius * radius} and circumference = ${2 * PI * radius}`
        }
    </script>
</body>

</html>
